name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'       # runs only when pushing tags like v1.0.0, v2.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
        type: string
      skip_tests:
        description: 'Skip tests'
        required: false
        default: true
        type: boolean

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # OIDC token issuance for NuGet Trusted Publishing

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Extract version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "PACKAGE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "PACKAGE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi

      - name: Create output directory
        run: mkdir -p ./nupkgs

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack all projects
        run: |
          for proj in $(find . -name 'Jezda.Common*.csproj' -not -name '*.Tests.csproj'); do
            echo "Packing project: $proj"
            dotnet pack "$proj" --configuration Release -p:PackageVersion=${PACKAGE_VERSION} --output ./nupkgs
          done

      - name: List generated packages
        run: ls -la ./nupkgs/

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1h) NuGet API key.
      # Requires a Trusted Publishing policy on nuget.org for this repo + workflow file.
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages to NuGet.org
        run: |
          for pkg in ./nupkgs/*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done